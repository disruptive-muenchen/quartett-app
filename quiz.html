<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>München Kommunikations-Quartett</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --card-dark: #1a2744;
    --card-mid: #243460;
    --card-accent: #c8a84b;
    --card-accent-light: #e8cc7a;
    --card-gold: #f0d080;
    --bg: #0d1520;
    --bg-felt: #0f1e2e;
    --text-light: #f0e8d0;
    --text-muted: #a89870;
    --winner: #c8a84b;
    --loser: #4a3030;
    --font-main: 'Playfair Display', Georgia, serif;
    --font-body: 'Libre Baskerville', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(200,168,75,0.015) 2px, rgba(200,168,75,0.015) 4px);
    color: var(--text-light);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 28px 20px 18px;
    border-bottom: 2px solid var(--card-accent);
    background: linear-gradient(180deg, #0a1018 0%, var(--bg) 100%);
    position: relative;
  }
  header::before, header::after {
    content: '✦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--card-accent);
    font-size: 1.4rem;
  }
  header::before { left: 24px; }
  header::after  { right: 24px; }

  .header-ornament {
    font-size: 0.7rem;
    letter-spacing: 6px;
    color: var(--card-accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: var(--font-main);
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--card-gold);
    text-shadow: 0 2px 8px rgba(200,168,75,0.4);
    letter-spacing: 1px;
  }
  header p {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-style: italic;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    background: #0a1018;
    border-bottom: 1px solid rgba(200,168,75,0.25);
  }
  .nav-btn {
    font-family: var(--font-main);
    font-size: 0.85rem;
    padding: 8px 22px;
    border: 1.5px solid var(--card-accent);
    background: transparent;
    color: var(--card-accent);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--card-accent);
    color: var(--card-dark);
    font-weight: 700;
  }

  /* ── MAIN ── */
  main { padding: 28px 20px; max-width: 1400px; margin: 0 auto; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-family: var(--font-main);
    font-size: 1.4rem;
    color: var(--card-gold);
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }
  .section-title span {
    display: inline-block;
    padding: 0 16px;
    border-left: 2px solid var(--card-accent);
    border-right: 2px solid var(--card-accent);
  }

  /* ── CARD GRID ── */
  #view-overview .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* ── SINGLE CARD ── */
  .card {
    background: linear-gradient(160deg, var(--card-mid) 0%, var(--card-dark) 60%, #101830 100%);
    border: 2px solid var(--card-accent);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(200,168,75,0.2);
    border-radius: 2px;
    pointer-events: none;
    z-index: 1;
  }
  .card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 20px rgba(200,168,75,0.2);
  }
  .card.selected {
    border-color: var(--card-gold);
    box-shadow: 0 0 0 3px rgba(200,168,75,0.5), 0 12px 32px rgba(0,0,0,0.6);
    transform: translateY(-4px) scale(1.02);
  }
  .card.winner-card {
    border-color: var(--winner);
    box-shadow: 0 0 0 4px rgba(200,168,75,0.7), 0 0 40px rgba(200,168,75,0.4);
    animation: pulseWin 0.6s ease-out;
  }
  .card.loser-card {
    opacity: 0.5;
    filter: grayscale(0.5);
    border-color: #555;
  }

  @keyframes pulseWin {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.06); }
    100% { transform: scale(1.02); }
  }

  /* Card header band */
  .card-band {
    background: linear-gradient(90deg, var(--card-accent) 0%, #a07830 100%);
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-nr {
    font-family: var(--font-main);
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--card-dark);
    letter-spacing: 1px;
  }
  .card-serie {
    font-size: 0.55rem;
    color: var(--card-dark);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Avatar */
  .card-avatar-wrap {
    padding: 12px 12px 6px;
    display: flex;
    justify-content: center;
  }
  .card-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid var(--card-accent);
    background: linear-gradient(135deg, #243460 0%, #0f1e2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-main);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--card-gold);
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Card body */
  .card-body {
    padding: 0 12px 10px;
    text-align: center;
  }
  .card-name {
    font-family: var(--font-main);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--card-gold);
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .card-title {
    font-size: 0.62rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .card-company {
    font-size: 0.65rem;
    color: var(--card-accent-light);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* Divider */
  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-accent), transparent);
    margin: 6px 0 10px;
  }

  /* Stats */
  .card-stats {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 0 4px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-label {
    font-size: 0.58rem;
    color: var(--text-muted);
    width: 70px;
    text-align: left;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .stat-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--card-accent), var(--card-gold));
    transition: width 0.5s ease;
  }
  .stat-value {
    font-family: var(--font-main);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--card-gold);
    width: 16px;
    text-align: right;
  }

  /* highlighted stat in duel */
  .stat-row.highlighted .stat-label { color: var(--card-gold); }
  .stat-row.highlighted .stat-bar { background: linear-gradient(90deg, #f0d080, #fff8c0); }
  .stat-row.highlighted .stat-value { color: #fff; text-shadow: 0 0 8px rgba(240,208,128,0.8); }

  /* Footer ornament */
  .card-foot {
    padding: 6px;
    text-align: center;
    font-size: 0.5rem;
    color: rgba(200,168,75,0.3);
    letter-spacing: 3px;
  }

  /* ── DETAIL VIEW ── */
  #view-detail {
    display: none;
    max-width: 480px;
    margin: 0 auto;
  }
  #view-detail .card {
    cursor: default;
  }
  #view-detail .card:hover {
    transform: none;
  }
  #view-detail .card-avatar { width: 130px; height: 130px; font-size: 2.8rem; }
  #view-detail .card-name { font-size: 1.3rem; }
  #view-detail .card-title { font-size: 0.8rem; }
  #view-detail .card-company { font-size: 0.85rem; }
  #view-detail .stat-label { font-size: 0.7rem; width: 90px; }
  #view-detail .stat-value { font-size: 0.9rem; }
  #view-detail .stat-bar-wrap { height: 8px; }

  .detail-back {
    display: block;
    text-align: center;
    margin: 16px auto 24px;
    font-family: var(--font-main);
    font-size: 0.8rem;
    color: var(--card-accent);
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
  }
  .detail-back:hover { color: var(--card-gold); }

  /* ── DUEL VIEW ── */
  #view-duel { display: none; }

  .duel-instructions {
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.82rem;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .duel-step-indicator {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(200,168,75,0.25);
    border: 1.5px solid var(--card-accent);
    transition: background 0.3s;
  }
  .step-dot.active { background: var(--card-gold); }

  .duel-pick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  /* Category selector */
  .cat-selector {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .cat-selector.visible { display: flex; }
  .cat-title {
    font-family: var(--font-main);
    font-size: 1.1rem;
    color: var(--card-gold);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .cat-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .cat-btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    padding: 10px 18px;
    border: 1.5px solid var(--card-accent);
    background: rgba(200,168,75,0.05);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    border-radius: 2px;
  }
  .cat-btn:hover {
    background: var(--card-accent);
    color: var(--card-dark);
    font-weight: 700;
  }

  /* Duel arena */
  .duel-arena {
    display: none;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    margin-bottom: 28px;
  }
  .duel-arena.visible { display: grid; }

  .vs-circle {
    font-family: var(--font-main);
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--card-accent);
    text-align: center;
    padding: 16px;
    border: 2px solid var(--card-accent);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    flex-shrink: 0;
  }

  /* Result banner */
  .result-banner {
    display: none;
    text-align: center;
    padding: 16px;
    border: 2px solid var(--card-accent);
    background: linear-gradient(135deg, rgba(200,168,75,0.08), rgba(200,168,75,0.02));
    margin-bottom: 20px;
    font-family: var(--font-main);
  }
  .result-banner.visible { display: block; }
  .result-title { font-size: 1.2rem; color: var(--card-gold); margin-bottom: 4px; }
  .result-sub { font-size: 0.78rem; color: var(--text-muted); }

  .duel-reset-btn {
    display: none;
    margin: 0 auto;
    padding: 10px 28px;
    font-family: var(--font-main);
    font-size: 0.85rem;
    background: var(--card-accent);
    color: var(--card-dark);
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    font-weight: 700;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.2s;
  }
  .duel-reset-btn:hover { background: var(--card-gold); }
  .duel-reset-btn.visible { display: block; }

  /* ── CONFETTI CANVAS ── */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header h1 { font-size: 1.5rem; }
    #view-overview .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    .duel-arena { grid-template-columns: 1fr; }
    .vs-circle { margin: 0 auto; }
  }
</style>
</head>

    <button class="duel-reset-btn" id="duel-reset-btn" onclick="resetDuel()">Neues Duell starten</button>

    <div class="duel-pick-grid" id="duel-pick-grid"></div>

</main>

let duelSelected = [];
let duelPhase = 0; // 0=pick, 1=pick2, 2=category, 3=result

// ── BUILD CARD ──
function buildCard(person, opts = {}) {
  const { clickable = true, showStats = true, highlightCat = null, size = 'normal' } = opts;
  const card = document.createElement('div');
  card.className = 'card' + (opts.extraClass ? ' ' + opts.extraClass : '');
  card.dataset.id = person.id;

  const statRows = Object.entries(catLabels).map(([key, label]) => {
    const val = person.stats[key];
    const pct = ((val - 0) / 10) * 100;
    const isHighlight = key === highlightCat;
    return `
      <div class="stat-row ${isHighlight ? 'highlighted' : ''}">
        <span class="stat-label">${label}</span>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
        <span class="stat-value">${val}</span>
      </div>`;
  }).join('');

  card.innerHTML = `
    <div class="card-band">
      <span class="card-nr">Nr. ${String(person.id).padStart(2,'0')}</span>
      <span class="card-serie">MK-Quartett 2025</span>
    </div>
    <div class="card-avatar-wrap">
      <div class="card-avatar" style="background: linear-gradient(135deg, ${person.color} 0%, #0d1520 100%)">
        ${person.initials}
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${person.name}</div>
      <div class="card-title">${person.title}</div>
      <div class="card-company">${person.company}</div>
      <div class="card-divider"></div>
      <div class="card-stats">${showStats ? statRows : ''}</div>
    </div>
    <div class="card-foot">✦ ✦ ✦</div>
  `;

  if (clickable) {
    card.addEventListener('click', () => handleCardClick(person));
  }
  return card;
}

// ── CARD CLICK HANDLER ──
function handleCardClick(person) {
  if (currentView === 'overview') {
    openDetail(person);
  } else if (currentView === 'duel') {
    handleDuelSelect(person);
  }
}

// ── OVERVIEW ──
function renderOverview() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  persons.forEach(p => grid.appendChild(buildCard(p)));
}

// ── DETAIL ──
function openDetail(person) {
  document.getElementById('view-overview').style.display = 'none';
  const view = document.getElementById('view-detail');
  view.style.display = 'block';
  const container = document.getElementById('detail-card-container');
  container.innerHTML = '';
  const card = buildCard(person, { clickable: false });

  // Larger avatar
  const av = card.querySelector('.card-avatar');
  av.style.width = '130px';
  av.style.height = '130px';
  av.style.fontSize = '2.8rem';
  const name = card.querySelector('.card-name');
  name.style.fontSize = '1.3rem';

  // Add bio section
  const bioEl = document.createElement('div');
  bioEl.style.cssText = 'padding:12px 16px 8px;font-size:0.75rem;color:#a89870;font-style:italic;line-height:1.6;border-top:1px solid rgba(200,168,75,0.2);';
  bioEl.innerHTML = `<p>${person.bio}</p><p style="margin-top:8px;font-size:0.65rem;opacity:0.6;">Quelle: ${person.source}</p>`;
  card.appendChild(bioEl);

  container.appendChild(card);

  // update nav buttons
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

function closeDetail() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-overview').style.display = 'block';
  document.querySelector('.nav-btn').classList.add('active');
}

// ── DUEL ──
function renderDuelPicker() {
  const grid = document.getElementById('duel-pick-grid');
  grid.innerHTML = '';
  persons.forEach(p => {
    const card = buildCard(p, { showStats: false });
    const isSelected = duelSelected.find(s => s.id === p.id);
    if (isSelected) card.classList.add('selected');
    grid.appendChild(card);
  });
}

function handleDuelSelect(person) {
  if (duelPhase >= 2) return;

  const existing = duelSelected.findIndex(s => s.id === person.id);
  if (existing !== -1) {
    duelSelected.splice(existing, 1);
  } else {
    if (duelSelected.length < 2) {
      duelSelected.push(person);
    }
  }

  updateDuelUI();
}

function updateDuelUI() {
  renderDuelPicker();

  const instr = document.getElementById('duel-instructions');
  const cat = document.getElementById('cat-selector');
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  const s3 = document.getElementById('step3');

  s1.classList.toggle('active', duelSelected.length >= 0);
  s2.classList.toggle('active', duelSelected.length >= 1);
  s3.classList.toggle('active', duelSelected.length >= 2);

  if (duelSelected.length === 0) {
    instr.textContent = 'Wähle zwei Karten für den Vergleich aus';
    cat.classList.remove('visible');
  } else if (duelSelected.length === 1) {
    instr.textContent = `„${duelSelected[0].name}" gewählt — wähle den Herausforderer`;
    cat.classList.remove('visible');
  } else {
    instr.textContent = `Duell: ${duelSelected[0].name} vs. ${duelSelected[1].name}`;
    cat.classList.add('visible');
    duelPhase = 2;
  }
}

function runDuel(cat) {
  const a = duelSelected[0];
  const b = duelSelected[1];
  const scoreA = a.stats[cat];
  const scoreB = b.stats[cat];

  duelPhase = 3;

  // Hide picker, show arena
  document.getElementById('duel-pick-grid').style.display = 'none';
  document.getElementById('cat-selector').classList.remove('visible');
  document.getElementById('duel-instructions').textContent = catLabels[cat];

  const arena = document.getElementById('duel-arena');
  arena.classList.add('visible');

  const cardAEl = document.getElementById('duel-card-a');
  const cardBEl = document.getElementById('duel-card-b');
  cardAEl.innerHTML = '';
  cardBEl.innerHTML = '';

  const cardA = buildCard(a, { clickable: false, highlightCat: cat });
  const cardB = buildCard(b, { clickable: false, highlightCat: cat });

  if (scoreA > scoreB) {
    cardA.classList.add('winner-card');
    cardB.classList.add('loser-card');
  } else if (scoreB > scoreA) {
    cardB.classList.add('winner-card');
    cardA.classList.add('loser-card');
  } else {
    cardA.classList.add('winner-card');
    cardB.classList.add('winner-card');
  }

  cardAEl.appendChild(cardA);
  cardBEl.appendChild(cardB);

  // Result banner
  const banner = document.getElementById('result-banner');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  banner.classList.add('visible');

  if (scoreA > scoreB) {
    title.textContent = `🏆 ${a.name} gewinnt!`;
    sub.textContent = `${catLabels[cat]}: ${scoreA} zu ${scoreB} Punkten`;
    launchConfetti();
  } else if (scoreB > scoreA) {
    title.textContent = `🏆 ${b.name} gewinnt!`;
    sub.textContent = `${catLabels[cat]}: ${scoreB} zu ${scoreA} Punkten`;
    launchConfetti();
  } else {
    title.textContent = '🤝 Unentschieden!';
    sub.textContent = `Beide erzielen ${scoreA} Punkte in ${catLabels[cat]}`;
  }

  document.getElementById('duel-reset-btn').classList.add('visible');
}

function resetDuel() {
  duelSelected = [];
  duelPhase = 0;
  document.getElementById('duel-pick-grid').style.display = '';
  document.getElementById('duel-arena').classList.remove('visible');
  document.getElementById('result-banner').classList.remove('visible');
  document.getElementById('duel-reset-btn').classList.remove('visible');
  document.getElementById('cat-selector').classList.remove('visible');
  updateDuelUI();
}

// ── VIEW SWITCHER ──
function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && view === 'overview') || (i === 1 && view === 'duel'));
  });
  document.getElementById('view-overview').style.display = view === 'overview' ? 'block' : 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-duel').style.display = view === 'duel' ? 'block' : 'none';

  if (view === 'duel') {
    resetDuel();
  }
}

// ── CONFETTI ──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#c8a84b', '#f0d080', '#e8cc7a', '#fff8c0', '#ffffff', '#a07830'];
  const particles = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: 3 + Math.random() * 5,
    d: 0.5 + Math.random() * 2,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltAngleIncrement: 0.07 + Math.random() * 0.1,
    opacity: 1
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.tiltAngle += p.tiltAngleIncrement;
      p.y += p.d * 3;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      p.opacity = Math.max(0, 1 - frame / 180);
      ctx.globalAlpha = p.opacity;
      ctx.beginPath();
      ctx.ellipse(p.x + p.tilt, p.y, p.r, p.r * 0.4, p.tilt * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    frame++;
    if (frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── INIT ──
renderOverview();
</script>
